    <!-- Grid of pixels forming a stylized "P" - scaled down -->
    <rect x="0" y="0" width="6" height="6" fill="#d946ef"/>
    <rect x="6" y="0" width="6" height="6" fill="#d946ef"/>
    <rect x="12" y="0" width="6" height="6" fill="#d946ef"/>
    <rect x="0" y="6" width="6" height="6" fill="#d946ef"/>
    <rect x="18" y="6" width="6" height="6" fill="#f97316"/>
    <rect x="0" y="12" width="6" height="6" fill="#d946ef"/>
    <rect x="6" y="12" width="6" height="6" fill="#f97316"/>
    <rect x="12" y="12" width="6" height="6" fill="#f97316"/>
    <rect x="0" y="18" width="6" height="6" fill="#d946ef"/>
    <rect x="0" y="24" width="6" height="6" fill="#d946ef"/>
  </g>

  <!-- Text -->
  <text x="36" y="26" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#111827">Pixel Studio</text>
